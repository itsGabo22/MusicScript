<svg width="64" height="64" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#10b981" />
        <stop offset="100%" stop-color="#059669" />
      </linearGradient>
    </defs>

    {/* Scaled version of the original design to fill the favicon space */}
    <g transform="translate(200, 200) scale(1.5)">
      <g transform="translate(-200, -170)">
        {/* Concentric circles */}
        <circle cx="200" cy="170" r="110" stroke="url(#tealGradient)" stroke-width="4" fill="none" stroke-dasharray="12 12" />
        <circle cx="200" cy="170" r="125" stroke="#10b981" stroke-width="2" fill="none" opacity="0.3" />

        {/* MJS Monogram with original thickness */}
        <g stroke="url(#tealGradient)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
          <polyline points="120,210 120,120 160,170 200,120 200,210" />
          <path d="M 240,120 V 190 A 25,25 0 0 1 190,190" />
          <path d="M 290,135 C 290,110 250,110 250,145 C 250,180 290,180 290,205 C 290,230 250,230 250,205" />
        </g>
      </g>
    </g>
</svg>